    function seededShuffle(arr, seed) {
      const result = arr.slice();
      let s = (seed || 1) >>> 0;
      for (let i = result.length - 1; i > 0; i--) {
        s = Math.imul(s ^ (s >>> 15), s | 1);
        s ^= s + Math.imul(s ^ (s >>> 7), s | 61);
        s = (s ^ (s >>> 14)) >>> 0;
        const j = s % (i + 1);
        const tmp = result[i]; result[i] = result[j]; result[j] = tmp;
      }
      return result;
    }
    function getDailyQuote(userId) {
      const day = Math.floor(Date.now() / 86400000);
      const cycle = Math.floor(day / QUOTES.length);
      const dayInCycle = day % QUOTES.length;
      let seed = cycle * 99991;
      if (userId) { for (let i = 0; i < userId.length; i++) seed = (seed + userId.charCodeAt(i) * (i + 1)) | 0; }
      return seededShuffle(QUOTES, seed)[dayInCycle];
    }

    async function shareStreak(habit) {
      const TODAY = getToday();
      const streak = daysBetween(parseDate(habit.quitDate), TODAY);
      const earned = MILESTONES.filter(m => streak >= m);
      const size = 1080;
      const canvas = document.createElement("canvas");
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#0e0e12"; ctx.fillRect(0, 0, size, size);
      const glow = ctx.createRadialGradient(size/2, size*0.42, 0, size/2, size*0.42, size*0.55);
      glow.addColorStop(0, habit.color + "33"); glow.addColorStop(1, "rgba(14,14,18,0)");
      ctx.fillStyle = glow; ctx.fillRect(0, 0, size, size);
      ctx.textAlign = "center";
      ctx.font = "600 32px -apple-system, Arial, sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.fillText(habit.name.toUpperCase(), size/2, 180);
      const ns = streak.toString();
      const numSize = ns.length <= 2 ? 260 : ns.length === 3 ? 200 : 160;
      ctx.font = "800 " + numSize + "px -apple-system, Arial, sans-serif"; ctx.fillStyle = "#ffffff";
      ctx.fillText(ns, size/2, 460);
      ctx.font = "500 42px -apple-system, Arial, sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.fillText("days clean", size/2, 540);
      ctx.font = "400 26px -apple-system, Arial, sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.28)";
      ctx.fillText("since " + humanDate(habit.quitDate), size/2, 596);
      if (earned.length > 0) {
        ctx.font = "600 24px -apple-system, Arial, sans-serif"; ctx.fillStyle = habit.color;
        ctx.fillText(earned.map(m => m + "d").join("   "), size/2, 680);
      }
      ctx.strokeStyle = habit.color + "66"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(size/2 - 60, 740); ctx.lineTo(size/2 + 60, 740); ctx.stroke();
      ctx.font = "700 22px -apple-system, Arial, sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.2)";
      ctx.fillText("CLEAN STREAK", size/2, 800);
      return new Promise(function(resolve) {
        canvas.toBlob(async function(blob) {
          if (!blob) { resolve(); return; }
          const file = new File([blob], "clean-streak.png", { type: "image/png" });
          try {
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
              await navigator.share({ files: [file], title: streak + " days clean", text: streak + " days clean from " + habit.name });

            }

          resolve();
        }, "image/png");
      });
    }

    function CalendarMonth({ year, month, habits, headless }) {
      const TODAY = getToday();
      const mNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const daysInMonth = new Date(year, month+1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();
      const mDays = new Set();
      habits.forEach(h => { const qd=parseDate(h.quitDate); MILESTONES.forEach(m=>{ const md=new Date(qd.getTime()+m*86400000); if(md.getFullYear()===year&&md.getMonth()===month) mDays.add(md.getDate()); }); });
      const cells = [];
      for(let i=0;i<firstDay;i++) cells.push(null);
      for(let d=1;d<=daysInMonth;d++) cells.push(d);
      const cellDate = d => new Date(year, month, d);
      const getDots = d => { const cd=cellDate(d); return habits.filter(h=>{ const qd=parseDate(h.quitDate); return cd>=qd&&cd<=TODAY; }); };
      const isToday = d => year===TODAY.getFullYear()&&month===TODAY.getMonth()&&d===TODAY.getDate();
      const isFuture = d => cellDate(d)>TODAY;
      return (
        <div style={{ padding:headless?0:"16px 14px", background:headless?"transparent":"var(--cal-dim)", borderRadius:headless?0:18, border:headless?"none":"1px solid var(--cal-dim-border)" }}>

          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:"2px 0" }}>
            {cells.map((d,i)=>{
              if(!d) return <div key={i}/>;
              const dots=getDots(d); const isMile=mDays.has(d)&&!isFuture(d); const today=isToday(d); const future=isFuture(d);

    function CollapsibleCalendar({ months, habits }) {
      const TODAY = getToday();
      const curKey = TODAY.getFullYear()+"-"+TODAY.getMonth();
      const init = {};
      months.forEach(({year,month})=>{ init[year+"-"+month]=(year+"-"+month===curKey); });
      const [open, setOpen] = useState(init);
      const mNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      return (
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {months.map(({year,month})=>{
            const key=year+"-"+month; const isOpen=!!open[key]; const isCur=(key===curKey);
            return (
              <div key={key}>
                <button onClick={()=>setOpen(p=>({...p,[key]:!p[key]}))} style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"11px 14px", borderRadius:isOpen?"14px 14px 0 0":14, background:isCur?"var(--cal-active)":"var(--cal-dim)", border:"1px solid "+(isCur?"var(--cal-active-border)":"var(--cal-dim-border)"), borderBottom:isOpen?"1px solid var(--cal-dim-border)":undefined, cursor:"pointer" }}>
                  <span style={{ fontSize:13, fontWeight:isCur?700:600, color:isCur?"var(--text)":"var(--text-dim)" }}>{mNames[month]} {year}</span>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    {isCur && <span style={{ fontSize:10, fontWeight:600, color:"var(--icon-dim)", textTransform:"uppercase" }}>Now</span>}
                    <svg width="12" height="12" viewBox="0 0 12 12" style={{ transform:isOpen?"rotate(180deg)":"none", transition:"transform 0.2s" }}><path d="M2 4l4 4 4-4" style={{ stroke:"var(--icon-dim)" }} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </div>
                </button>
                {isOpen && <div style={{ background:isCur?"var(--cal-open-bg)":"var(--cal-open-bg2)", borderRadius:"0 0 14px 14px", border:"1px solid "+(isCur?"var(--cal-open-border)":"var(--cal-open-border2)"), borderTop:"none", padding:"12px 14px" }}><CalendarMonth year={year} month={month} habits={habits} headless={true}/></div>}
              </div>

    }

    function AccountSheet({ onClose, userId, userEmail }) {
      const [mode, setMode] = useState("menu");
      const [email, setEmail] = useState("");
      const [loading, setLoading] = useState(false);
      const [msg, setMsg] = useState("");
      async function handleSend() {
        if (!email.trim()) return;
        setLoading(true); setMsg("");
        try {
          let err;
          if (mode === "link") {
            const res = await sb.auth.updateUser({ email: email.trim() });
            err = res.error;
          } else {
            const res = await sb.auth.signInWithOtp({ email: email.trim(), options: { emailRedirectTo: window.location.origin } });
            err = res.error;
          }
          if (err) { setMsg(err.message); } else { setMode("sent"); }
        } catch(e) { setMsg("Something went wrong. Please try again."); }
        setLoading(false);
      }
      return (
        <div style={{ position:"absolute", inset:0, zIndex:100, display:"flex", flexDirection:"column", justifyContent:"flex-end" }}>
          <div onClick={onClose} style={{ position:"absolute", inset:0, background:"var(--backdrop)", backdropFilter:"blur(4px)" }}/>
          <div className="animate-sheetIn" style={{ position:"relative", background:"var(--bg-sheet)", borderRadius:"24px 24px 0 0", padding:"0 0 max(40px, env(safe-area-inset-bottom))", border:"1px solid var(--separator)", borderBottom:"none", zIndex:10, overflow:"hidden" }}>
            <div style={{ display:"flex", justifyContent:"center", padding:"12px 0 18px" }}><div style={{ width:36, height:4, borderRadius:2, background:"var(--handle)" }}/></div>

              <div style={{ fontSize:18, fontWeight:700, color:"var(--text)" }}>Account</div>
              <div style={{ fontSize:13, color:"var(--text-dim)", marginTop:2 }}>{userEmail ? "Signed in as " + userEmail : "Back up your streaks across devices"}</div>
            </div>
            <div style={{ padding:"0 20px" }}>
              {userEmail ? (
                <div style={{ background:"rgba(77,191,122,0.1)", border:"1px solid rgba(77,191,122,0.3)", borderRadius:14, padding:"16px", marginBottom:16, display:"flex", alignItems:"center", gap:12 }}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#4DBF7A" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  <div>
                    <div style={{ fontSize:14, fontWeight:600, color:"#4DBF7A" }}>Data backed up</div>
                    <div style={{ fontSize:12, color:"var(--text-dim)", marginTop:2 }}>{userEmail}</div>

                </React.Fragment>
              ) : mode === "sent" ? (
                <div style={{ textAlign:"center", padding:"20px 0 10px" }}>
                  <div style={{ fontSize:44, marginBottom:14 }}>📬</div>
                  <div style={{ fontSize:16, fontWeight:700, color:"var(--text)", marginBottom:8 }}>Check your email</div>
                  <div style={{ fontSize:14, color:"var(--text-dim)", lineHeight:1.6 }}>{"We sent a link to " + email + ". Tap it to confirm."}</div>

                <React.Fragment>
                  <div style={{ fontSize:13, color:"var(--text-dim)", marginBottom:16, lineHeight:1.5 }}>{mode === "link" ? "Enter your email to save your progress. We will send a confirmation link." : "Enter the email you used on your other device. We will send a sign-in link."}</div>
                  <input value={email} onChange={function(e) { setEmail(e.target.value); }} placeholder="your@email.com" type="email" style={{ width:"100%", padding:"14px 16px", borderRadius:14, background:"var(--input-bg)", border:"1px solid var(--input-border)", color:"var(--text)", fontSize:16, outline:"none", marginBottom:12 }}/>
                  {msg ? <div style={{ fontSize:12, color:"#E05252", marginBottom:10 }}>{msg}</div> : null}
                  <button onClick={handleSend} disabled={loading || !email.trim()} style={{ width:"100%", padding:"15px", borderRadius:14, background:email.trim() ? "linear-gradient(135deg, #5B8EF0 0%, #4DBF7A 100%)" : "var(--overlay)", border:"none", color:email.trim() ? "#fff" : "var(--text-faint)", fontSize:15, fontWeight:700, cursor:email.trim() ? "pointer" : "default", marginBottom:10, opacity:loading ? 0.7 : 1 }}>
                    {loading ? "Sending..." : "Send magic link"}
                  </button>
                  <button onClick={function() { setMode("menu"); setMsg(""); }} style={{ width:"100%", padding:"13px", borderRadius:14, background:"transparent", border:"1px solid var(--separator)", color:"var(--icon-dim)", fontSize:14, cursor:"pointer" }}>Back</button>
                </React.Fragment>
              )}
            </div>
          </div>
        </div>
      );
    }

    function getSessionStreak(habitSessions) {
      const dateSet = new Set(habitSessions.map(function(s) { return s.sessionDate; }));
      let streak = 0;
      let d = getToday();
      while (dateSet.has(formatDate(d))) {
        streak++;
        d = new Date(d.getTime() - 86400000);
      }
      return streak;
    }

    function NavTab({ id, label, activeTab, onSwitch, children }) {
      const active = activeTab === id;
      return (
        <button onClick={function() { onSwitch(id); }} style={{ flex:1, padding:"10px 0 8px", display:"flex", flexDirection:"column", alignItems:"center", gap:4, background:"transparent", border:"none", cursor:"pointer" }}>
          {children}
          <span style={{ fontSize:10, fontWeight:600, color:active?"var(--text)":"var(--icon)", letterSpacing:0.3 }}>{label}</span>
        </button>
      );
    }

    function BottomNav({ activeTab, onSwitch }) {
      const streaksActive = activeTab === "streaks";
      const sessionsActive = activeTab === "sessions";
      const streakColor = streaksActive ? "var(--text)" : "var(--icon)";
      const sessionColor = sessionsActive ? "var(--text)" : "var(--icon)";
      return (
        <div style={{ background:"var(--bg-sheet)", borderTop:"1px solid var(--separator)", display:"flex", paddingBottom:"env(safe-area-inset-bottom)", flexShrink:0, zIndex:50 }}>
          <NavTab id="streaks" label="Streaks" activeTab={activeTab} onSwitch={onSwitch}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" style={{ stroke:streakColor, fill:streaksActive?"var(--text)":"none" }} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </NavTab>
          <NavTab id="sessions" label="Sessions" activeTab={activeTab} onSwitch={onSwitch}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="7" height="7" rx="1.5" style={{ stroke:sessionColor }} strokeWidth="1.8"/>
              <rect x="14" y="3" width="7" height="7" rx="1.5" style={{ stroke:sessionColor }} strokeWidth="1.8"/>
              <rect x="3" y="14" width="7" height="7" rx="1.5" style={{ stroke:sessionColor }} strokeWidth="1.8"/>
              <rect x="14" y="14" width="7" height="7" rx="1.5" style={{ stroke:sessionColor, fill:sessionsActive?"var(--text)":"none" }} strokeWidth="1.8"/>
            </svg>
          </NavTab>
        </div>
      );
    }

    function SessionCard({ habit, sessions, onLog, onLogPast, onTap }) {
      const today = formatDate(getToday());
      const habitSessions = sessions.filter(function(s) { return s.habitId === habit.id; });
      const loggedToday = habitSessions.some(function(s) { return s.sessionDate === today; });
      const total = habitSessions.length;
      const streak = getSessionStreak(habitSessions);
      const last7 = [];
      for (let i = 0; i < 7; i++) { last7.push(formatDate(new Date(getToday().getTime() - i * 86400000))); }
      const weekCount = habitSessions.filter(function(s) { return last7.includes(s.sessionDate); }).length;
      return (
        <div style={{ background:"var(--card)", borderRadius:18, border:"1px solid var(--card-border)", padding:"14px 16px 16px" }}>
          <div onClick={onTap} style={{ display:"flex", alignItems:"center", gap:6, marginBottom:12, cursor:"pointer" }}>
            <div style={{ width:8, height:8, borderRadius:"50%", background:habit.color, flexShrink:0 }} />
            <span style={{ fontSize:14, fontWeight:600, color:"var(--text)", flex:1, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{habit.name}</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="1" style={{ fill:"var(--icon-dim)" }}/><circle cx="12" cy="5" r="1" style={{ fill:"var(--icon-dim)" }}/><circle cx="12" cy="19" r="1" style={{ fill:"var(--icon-dim)" }}/></svg>
          </div>
          <div style={{ display:"flex", gap:8, marginBottom:14 }}>
            <div style={{ flex:1, background:"var(--badge-bg)", borderRadius:10, padding:"8px 10px", border:"1px solid var(--separator)" }}>
              <div style={{ fontSize:20, fontWeight:800, color:"var(--text)", lineHeight:1 }}>{total}</div>
              <div style={{ fontSize:10, color:"var(--text-faint)", marginTop:3 }}>total</div>
            </div>
            <div style={{ flex:1, background:"var(--badge-bg)", borderRadius:10, padding:"8px 10px", border:"1px solid var(--separator)" }}>
              <div style={{ fontSize:20, fontWeight:800, color:streak>0?habit.color:"var(--text)", lineHeight:1 }}>{streak}</div>
              <div style={{ fontSize:10, color:"var(--text-faint)", marginTop:3 }}>streak</div>
            </div>
            <div style={{ flex:1, background:"var(--badge-bg)", borderRadius:10, padding:"8px 10px", border:"1px solid var(--separator)" }}>
              <div style={{ fontSize:20, fontWeight:800, color:"var(--text)", lineHeight:1 }}>{weekCount}<span style={{ fontSize:11, fontWeight:500, color:"var(--text-faint)" }}>/7</span></div>
              <div style={{ fontSize:10, color:"var(--text-faint)", marginTop:3 }}>this week</div>
            </div>
          </div>
          <button
            onClick={function() { if (!loggedToday) onLog(habit.id, today); }}
            disabled={loggedToday}
            style={{ width:"100%", padding:"13px", borderRadius:14, background:loggedToday?habit.color+"22":habit.color, border:loggedToday?"1px solid "+habit.color+"55":"none", color:loggedToday?habit.color:"#fff", fontSize:14, fontWeight:700, cursor:loggedToday?"default":"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:8, marginBottom:10, transition:"all 0.2s" }}>
            {loggedToday ? (
              <React.Fragment>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" style={{ stroke:habit.color }} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                Logged today
              </React.Fragment>
            ) : "Log today"}
          </button>
          <button onClick={function() { onLogPast(habit); }} style={{ background:"transparent", border:"none", color:"var(--text-faint)", fontSize:12, cursor:"pointer", padding:"2px 0", display:"block", width:"100%", textAlign:"center" }}>Manage sessions</button>
        </div>
      );
    }

    function LogPastSheet({ habit, sessions, onClose, onLog, onRemove }) {
      const TODAY = getToday();
      const mNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const startParts = habit.quitDate.split("-");
      const startYear = parseInt(startParts[0]);
      const startMonth = parseInt(startParts[1]) - 1;
      const curYear = TODAY.getFullYear();
      const curMonth = TODAY.getMonth();
      const [viewYear, setViewYear] = useState(curYear);
      const [viewMonth, setViewMonth] = useState(curMonth);
      const habitSessions = sessions.filter(function(s) { return s.habitId === habit.id; });
      const loggedSet = new Set(habitSessions.map(function(s) { return s.sessionDate; }));
      const atStart = (viewYear === startYear && viewMonth === startMonth);
      const atCurrent = (viewYear === curYear && viewMonth === curMonth);
      const quitDate = parseDate(habit.quitDate);
      function prevMonth() {
        if (atStart) return;
        if (viewMonth === 0) { setViewYear(viewYear - 1); setViewMonth(11); }
        else setViewMonth(viewMonth - 1);
      }
      function nextMonth() {
        if (atCurrent) return;
        if (viewMonth === 11) { setViewYear(viewYear + 1); setViewMonth(0); }
        else setViewMonth(viewMonth + 1);
      }
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const firstDay = new Date(viewYear, viewMonth, 1).getDay();
      const cells = [];
      for (var i = 0; i < firstDay; i++) cells.push(null);
      for (var d = 1; d <= daysInMonth; d++) cells.push(d);
      function handleDayTap(day) {
        var cellDate = new Date(viewYear, viewMonth, day);
        var dateStr = viewYear + "-" + String(viewMonth + 1).padStart(2, "0") + "-" + String(day).padStart(2, "0");
        if (cellDate < quitDate || cellDate >= TODAY) return;
        if (loggedSet.has(dateStr)) { onRemove(habit.id, dateStr); }
        else { onLog(habit.id, dateStr); }
      }
      return (
        <div style={{ position:"absolute", inset:0, zIndex:100, display:"flex", flexDirection:"column", justifyContent:"flex-end" }}>
          <div onClick={onClose} style={{ position:"absolute", inset:0, background:"var(--backdrop)", backdropFilter:"blur(4px)" }}/>
          <div className="animate-sheetIn" style={{ position:"relative", background:"var(--bg-sheet)", borderRadius:"24px 24px 0 0", padding:"0 0 max(40px, env(safe-area-inset-bottom))", border:"1px solid var(--separator)", borderBottom:"none", zIndex:10, overflow:"hidden" }}>
            <div style={{ display:"flex", justifyContent:"center", padding:"12px 0 18px" }}><div style={{ width:36, height:4, borderRadius:2, background:"var(--handle)" }}/></div>
            <div style={{ padding:"0 20px 16px", display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:10, height:10, borderRadius:"50%", background:habit.color, flexShrink:0 }}/>
              <div>
                <div style={{ fontSize:18, fontWeight:700, color:"var(--text)" }}>Manage sessions</div>
                <div style={{ fontSize:13, color:"var(--text-dim)", marginTop:2 }}>{habit.name} · tap to log or remove</div>
              </div>
            </div>
            <div style={{ padding:"0 20px 20px" }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
                <button onClick={prevMonth} style={{ background:"transparent", border:"none", cursor:atStart?"default":"pointer", opacity:atStart?0.25:1, color:"var(--text)", fontSize:22, lineHeight:1, padding:"4px 10px" }}>&#8249;</button>
                <span style={{ fontSize:15, fontWeight:700, color:"var(--text)" }}>{mNames[viewMonth]} {viewYear}</span>
                <button onClick={nextMonth} style={{ background:"transparent", border:"none", cursor:atCurrent?"default":"pointer", opacity:atCurrent?0.25:1, color:"var(--text)", fontSize:22, lineHeight:1, padding:"4px 10px" }}>&#8250;</button>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:6 }}>
                {["S","M","T","W","T","F","S"].map(function(dn,idx) { return <div key={idx} style={{ textAlign:"center", fontSize:10, fontWeight:600, color:"var(--text-muted)", padding:"2px 0" }}>{dn}</div>; })}
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:"4px 0" }}>
                {cells.map(function(day, idx) {
                  if (!day) return <div key={idx}/>;
                  var cellDate = new Date(viewYear, viewMonth, day);
                  var dateStr = viewYear + "-" + String(viewMonth+1).padStart(2,"0") + "-" + String(day).padStart(2,"0");
                  var isLogged = loggedSet.has(dateStr);
                  var isDisabled = cellDate < quitDate || cellDate >= TODAY;
                  var isToday = (viewYear===TODAY.getFullYear()&&viewMonth===TODAY.getMonth()&&day===TODAY.getDate());
                  return (
                    <div key={idx} onClick={function() { handleDayTap(day); }} style={{ display:"flex", alignItems:"center", justifyContent:"center", padding:"3px 0", cursor:isDisabled?"default":"pointer" }}>
                      <div style={{ width:30, height:30, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", background:isLogged?habit.color:(isToday?"var(--today-ring)":"transparent"), border:(isToday&&!isLogged)?"1px solid var(--today-ring)":"none", opacity:isDisabled?0.2:1, transition:"background 0.15s" }}>
                        <span style={{ fontSize:12, fontWeight:(isLogged||isToday)?700:400, color:isLogged?"#fff":"var(--text)", pointerEvents:"none" }}>{day}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function SessionCalendarMonth({ year, month, habits, sessionsByHabit, headless }) {
      const TODAY = getToday();
      const mNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const daysInMonth = new Date(year, month+1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();
      const cells = [];
      for (let i = 0; i < firstDay; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(d);
      const isToday = function(d) { return year===TODAY.getFullYear()&&month===TODAY.getMonth()&&d===TODAY.getDate(); };
      const isFuture = function(d) { return new Date(year, month, d) > TODAY; };
      const getSessionDots = function(d) {
        const dateStr = year+"-"+String(month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
        return habits.filter(function(h) { return sessionsByHabit[h.id] && sessionsByHabit[h.id].has(dateStr); });
      };
      return (
        <div style={{ padding:headless?0:"16px 14px", background:headless?"transparent":"var(--cal-dim)", borderRadius:headless?0:18, border:headless?"none":"1px solid var(--cal-dim-border)" }}>
          {!headless && <div style={{ fontSize:14, fontWeight:700, color:"var(--text)", marginBottom:14 }}>{mNames[month]} {year}</div>}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:6 }}>
            {["S","M","T","W","T","F","S"].map(function(d,i) { return <div key={i} style={{ textAlign:"center", fontSize:10, fontWeight:600, color:"var(--text-muted)", padding:"2px 0" }}>{d}</div>; })}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:"2px 0" }}>
            {cells.map(function(d,i) {
              if (!d) return <div key={i}/>;
              const dots = getSessionDots(d);
              const today = isToday(d);
              const future = isFuture(d);
              return (
                <div key={i} style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"2px 0" }}>
                  <div style={{ fontSize:11, fontWeight:today?700:400, color:future?"var(--future-text)":today?"var(--text)":"var(--text-sub)", width:22, height:22, display:"flex", alignItems:"center", justifyContent:"center", borderRadius:"50%", background:today?"var(--today-ring)":"transparent" }}>{d}</div>
                  <div style={{ display:"flex", gap:2, minHeight:8, alignItems:"center", justifyContent:"center" }}>
                    {dots.map(function(h) { return <div key={h.id} style={{ width:5, height:5, borderRadius:"50%", background:h.color, opacity:future?0.2:0.9 }}/>; })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function SessionCollapsibleCalendar({ months, habits, sessionsByHabit }) {
      const TODAY = getToday();
      const curKey = TODAY.getFullYear()+"-"+TODAY.getMonth();
      const init = {};
      months.forEach(function(m) { init[m.year+"-"+m.month] = (m.year+"-"+m.month === curKey); });
      const [open, setOpen] = useState(init);
      const mNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      return (
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {months.map(function(m) {
            const key = m.year+"-"+m.month; const isOpen = !!open[key]; const isCur = (key === curKey);
            return (
              <div key={key}>
                <button onClick={function() { setOpen(function(p) { return {...p, [key]:!p[key]}; }); }} style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"11px 14px", borderRadius:isOpen?"14px 14px 0 0":14, background:isCur?"var(--cal-active)":"var(--cal-dim)", border:"1px solid "+(isCur?"var(--cal-active-border)":"var(--cal-dim-border)"), borderBottom:isOpen?"1px solid var(--cal-dim-border)":undefined, cursor:"pointer" }}>
                  <span style={{ fontSize:13, fontWeight:isCur?700:600, color:isCur?"var(--text)":"var(--text-dim)" }}>{mNames[m.month]} {m.year}</span>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    {isCur && <span style={{ fontSize:10, fontWeight:600, color:"var(--icon-dim)", textTransform:"uppercase" }}>Now</span>}
                    <svg width="12" height="12" viewBox="0 0 12 12" style={{ transform:isOpen?"rotate(180deg)":"none", transition:"transform 0.2s" }}><path d="M2 4l4 4 4-4" style={{ stroke:"var(--icon-dim)" }} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </div>
                </button>
                {isOpen && <div style={{ background:isCur?"var(--cal-open-bg)":"var(--cal-open-bg2)", borderRadius:"0 0 14px 14px", border:"1px solid "+(isCur?"var(--cal-open-border)":"var(--cal-open-border2)"), borderTop:"none", padding:"12px 14px" }}><SessionCalendarMonth year={m.year} month={m.month} habits={habits} sessionsByHabit={sessionsByHabit} headless={true}/></div>}
              </div>
            );
          })}
        </div>
      );
    }

    function SessionsScreen({ name, habits, sessions, sessionsLoaded, onAddHabit, onTapHabit, onLogSession, onLogPast }) {
      const TODAY = getToday();
      const earliest = habits.length ? habits.reduce(function(min,h) { const d=parseDate(h.quitDate); return d<min?d:min; }, TODAY) : TODAY;
      const months = [];
      let cur = new Date(earliest.getFullYear(), earliest.getMonth(), 1);
      const end = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
      while (cur <= end) { months.push({ year:cur.getFullYear(), month:cur.getMonth() }); cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1); }
      const sessionsByHabit = {};
      habits.forEach(function(h) { sessionsByHabit[h.id] = new Set(); });
      sessions.forEach(function(s) { if (sessionsByHabit[s.habitId]) sessionsByHabit[s.habitId].add(s.sessionDate); });
      if (!sessionsLoaded) {
        return (
          <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", background:"var(--bg)" }}>
            <div style={{ width:36, height:36, borderRadius:"50%", border:"2.5px solid rgba(91,142,240,0.15)", borderTop:"2.5px solid #5B8EF0", animation:"spin 0.8s linear infinite" }}/>
          </div>
        );
      }
      return (
        <div style={{ flex:1, overflowY:"auto", background:"var(--bg)", paddingTop:"env(safe-area-inset-top)", paddingBottom:"calc(60px + max(env(safe-area-inset-bottom), 24px))" }}>
          <div style={{ padding:"18px 20px 16px" }}>
            <div style={{ fontSize:11, fontWeight:600, letterSpacing:2, color:"var(--text-faint)", textTransform:"uppercase", marginBottom:4 }}>clean streak</div>
            <div style={{ fontSize:22, fontWeight:700, color:"var(--text)" }}>{name ? "Hey "+name+" 👋" : "Your sessions"}</div>
          </div>
          {habits.length === 0 ? (
            <div style={{ padding:"48px 24px", textAlign:"center" }}>
              <div style={{ fontSize:40, marginBottom:16 }}>🌱</div>
              <div style={{ fontSize:17, fontWeight:700, color:"var(--text)", marginBottom:8 }}>Nothing to track yet</div>
              <div style={{ fontSize:14, color:"var(--text-dim)", lineHeight:1.6, marginBottom:28 }}>Add a habit you want to build — gym, reading, meditation, anything.</div>
              <button onClick={onAddHabit} style={{ padding:"14px 28px", borderRadius:14, background:"linear-gradient(135deg, #5B8EF0 0%, #4DBF7A 100%)", border:"none", color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer" }}>Add your first habit</button>
            </div>
          ) : (
            <React.Fragment>
              <div style={{ padding:"0 16px 4px", display:"flex", flexDirection:"column", gap:12 }}>
                {habits.map(function(h) { return <SessionCard key={h.id} habit={h} sessions={sessions} onLog={onLogSession} onLogPast={onLogPast} onTap={function() { onTapHabit(h); }}/>; })}
              </div>
              <div style={{ padding:"12px 16px 0" }}>
                <button onClick={onAddHabit} style={{ width:"100%", padding:"12px", borderRadius:14, background:"var(--quote-bg)", border:"1px dashed var(--dashed-border)", color:"var(--dashed-color)", fontSize:13, fontWeight:500, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                  <span style={{ fontSize:16 }}>+</span> Track a new habit
                </button>
              </div>
              <div style={{ padding:"20px 16px 0" }}>
                <div style={{ display:"flex", gap:12, flexWrap:"wrap", padding:"0 2px 14px", alignItems:"center" }}>
                  {habits.map(function(h) { return (
                    <div key={h.id} style={{ display:"flex", alignItems:"center", gap:5 }}>
                      <div style={{ width:7, height:7, borderRadius:"50%", background:h.color }}/>
                      <span style={{ fontSize:11, color:"var(--text-dim)", fontWeight:500 }}>{h.name}</span>
                    </div>
                  ); })}
                </div>
                <SessionCollapsibleCalendar months={months} habits={habits} sessionsByHabit={sessionsByHabit}/>
              </div>
            </React.Fragment>
          )}
        </div>
      );
    }

    function App() {
      const [loading, setLoading]             = useState(true);
      const [userId,  setUserId]              = useState(null);
      const [userEmail, setUserEmail]         = useState("");
      const [screen,  setScreen]              = useState("onboarding");
      const [name,    setName]                = useState("");
      const [habits,  setHabits]              = useState([]);
      const [selectedHabit, setSelectedHabit] = useState(null);
      const [showNotif,    setShowNotif]      = useState(false);
      const [addHabitType, setAddHabitType]   = useState(null);
      const [showAccount,  setShowAccount]    = useState(false);
      const [showLogPast,  setShowLogPast]    = useState(null);
      const [activeTab,    setActiveTab]      = useState("streaks");
      const [sessions,     setSessions]       = useState([]);
      const [sessionsLoaded, setSessionsLoaded] = useState(false);
      const [isDark, setIsDark] = useState(function() {
        try { return localStorage.getItem("theme") !== "light"; } catch(e) { return true; }
      });

      useEffect(function() {
        document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
        try { localStorage.setItem("theme", isDark ? "dark" : "light"); } catch(e) {}
      }, [isDark]);

      function toggleTheme() { setIsDark(function(d) { return !d; }); }

      useEffect(function() {
        async function init() {
          if (!sb) { setLoading(false); setSessionsLoaded(true); return; }
          try {
            let { data: { session } } = await sb.auth.getSession();
            if (!session) { const { data } = await sb.auth.signInAnonymously(); session = data.session; }
            if (!session) { setLoading(false); return; }
            const uid = session.user.id;
            setUserId(uid);
            if (session.user.email) setUserEmail(session.user.email);
            const { data: profile } = await sb.from("user_profiles").select("*").eq("id", uid).maybeSingle();
            if (profile && profile.name) setName(profile.name);
            if (profile && profile.onboarding_done) setScreen("dashboard");
            const { data: rows } = await sb.from("habits").select("*").eq("user_id", uid).order("created_at");
            if (rows && rows.length) setHabits(rows.map(function(r) { return { id:r.id, name:r.name, color:r.color, quitDate:r.quit_date, habitType:r.habit_type||"quit", previousQuitDate:r.previous_quit_date||null }; }));
            if (typeof Notification !== "undefined" && Notification.permission === "granted" && VAPID_PUB_KEY && VAPID_PUB_KEY.length > 50 && "serviceWorker" in navigator) {
              try {
                const reg = await navigator.serviceWorker.ready;
                const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(VAPID_PUB_KEY) });
                await sb.from("push_subscriptions").upsert({ user_id: uid, subscription: sub.toJSON() }, { onConflict: "user_id" });
              } catch(e) { console.warn("Push re-subscribe failed:", e); }
            }
          } catch(e) { console.error("Init error:", e); }
          setLoading(false);
        }
        init();
      }, []);

      useEffect(function() {
        if (!sb) return;
        const { data: { subscription: authSub } } = sb.auth.onAuthStateChange(async function(event, session) {
          if (!session) return;
          if (event === "USER_UPDATED" && session.user.email) {
            setUserEmail(session.user.email);
          }
          if (event === "SIGNED_IN" && session.user.email) {
            const uid = session.user.id;
            setUserId(uid);
            setUserEmail(session.user.email);
            const { data: profile } = await sb.from("user_profiles").select("*").eq("id", uid).maybeSingle();
            if (profile && profile.name) setName(profile.name);
            if (profile && profile.onboarding_done) setScreen("dashboard");
            const { data: rows } = await sb.from("habits").select("*").eq("user_id", uid).order("created_at");
            if (rows && rows.length) setHabits(rows.map(function(r) { return { id:r.id, name:r.name, color:r.color, quitDate:r.quit_date, habitType:r.habit_type||"quit", previousQuitDate:r.previous_quit_date||null }; }));
          }
        });
        return function() { authSub.unsubscribe(); };
      }, []);

      useEffect(function() {
        if (activeTab === "sessions" && !sessionsLoaded && userId) {
          loadSessions(userId);
        }
      }, [activeTab, userId]);

      async function loadSessions(uid) {
        if (!uid) return;
        const { data } = await sb.from("sessions").select("*").eq("user_id", uid);
        setSessions((data||[]).map(function(r) { return { id:r.id, userId:r.user_id, habitId:r.habit_id, sessionDate:r.session_date }; }));
        setSessionsLoaded(true);
      }

      async function syncHabits(uid, newHabits) {
        if (!uid) return;
        const { data: existing } = await sb.from("habits").select("id").eq("user_id", uid);
        const existingIds = (existing||[]).map(function(r) { return r.id; });
        const toDelete = existingIds.filter(function(id) { return !newHabits.map(function(h) { return h.id; }).includes(id); });
        if (toDelete.length) await sb.from("habits").delete().in("id", toDelete).eq("user_id", uid);
        if (newHabits.length) await sb.from("habits").upsert(newHabits.map(function(h) { return { id:h.id, user_id:uid, name:h.name, color:h.color, quit_date:h.quitDate, habit_type:h.habitType||"quit", previous_quit_date:h.previousQuitDate||null }; }), { onConflict:"id,user_id" });
      }

      async function handleOnboardingComplete(n, h) {
        const newHabits = h.map(function(x,i) { return {...x, id:"h"+(Date.now()+i)}; });
        setName(n); setHabits(newHabits); setScreen("notif");
        if (userId) {
          await sb.from("user_profiles").upsert({ id:userId, name:n, onboarding_done:true });
          await syncHabits(userId, newHabits);
        }
      }
      async function handleHabitUpdate(updated) {
        const oldHabit = habits.find(function(h) { return h.id === updated.id; });
        let final = updated;
        if (oldHabit && updated.quitDate > oldHabit.quitDate) {
          final = { ...updated, previousQuitDate: oldHabit.quitDate };
        }
        const newHabits = habits.map(function(h) { return h.id===final.id?final:h; });
        setHabits(newHabits);
        if (userId) await syncHabits(userId, newHabits);
      }
      async function handleDeleteSession(habitId, dateStr) {
        setSessions(function(prev) { return prev.filter(function(s) { return !(s.habitId===habitId && s.sessionDate===dateStr); }); });
        if (userId && sb) {
          await sb.from("sessions").delete().eq("user_id", userId).eq("habit_id", habitId).eq("session_date", dateStr);
        }
      }
      async function handleAddHabit({ name:n, color, quitDate, habitType }) {
        const newHabit = { id:"h"+Date.now(), name:n, color, quitDate, habitType:habitType||"quit" };
        const newHabits = [...habits, newHabit];
        setHabits(newHabits);
        if (userId) await syncHabits(userId, newHabits);
      }
      async function handleDeleteHabit(id) {
        const newHabits = habits.filter(function(h) { return h.id!==id; });
        setHabits(newHabits);
        setSessions(function(prev) { return prev.filter(function(s) { return s.habitId!==id; }); });
        if (userId) {
          await syncHabits(userId, newHabits);
          await sb.from("sessions").delete().eq("habit_id", id).eq("user_id", userId);
        }
      }
      async function handleLogSession(habitId, dateStr) {
        if (sessions.some(function(s) { return s.habitId===habitId && s.sessionDate===dateStr; })) return;
        const tempId = "tmp-"+Date.now();
        const tempSession = { id:tempId, userId, habitId, sessionDate:dateStr };
        setSessions(function(prev) { return [...prev, tempSession]; });
        if (userId) {
          const { data } = await sb.from("sessions").upsert({ user_id:userId, habit_id:habitId, session_date:dateStr }, { onConflict:"user_id,habit_id,session_date" }).select().single();
          if (data) {
            setSessions(function(prev) { return prev.map(function(s) { return s.id===tempId ? { id:data.id, userId:data.user_id, habitId:data.habit_id, sessionDate:data.session_date } : s; }); });
          }
        }
      }

      if (loading) return <LoadingScreen/>;

      if (screen==="onboarding") return <OnboardingScreen onComplete={handleOnboardingComplete}/>;
      if (screen==="notif") return <NotifScreen onAllow={function() { setScreen("dashboard"); }} onSkip={function() { setScreen("dashboard"); }} userId={userId}/>;
      if (showNotif) return <NotifScreen onAllow={function() { setShowNotif(false); }} onSkip={function() { setShowNotif(false); }} userId={userId}/>;

      const quitHabits = habits.filter(function(h) { return (h.habitType||"quit") === "quit"; });
      const buildHabits = habits.filter(function(h) { return h.habitType === "build"; });

      return (
        <div style={{ height:"100%", display:"flex", flexDirection:"column", background:"var(--bg)", overflow:"hidden" }}>
          <div style={{ flex:1, position:"relative", display:"flex", flexDirection:"column", overflow:"hidden" }}>
            {activeTab === "streaks" ? (
              <DashboardScreen name={name} habits={quitHabits} onTapHabit={function(h) { setSelectedHabit(h); }} onOpenNotif={function() { setShowNotif(true); }} onAddHabit={function() { setAddHabitType("quit"); }} onOpenAccount={function() { setShowAccount(true); }} onToggleTheme={toggleTheme} isDark={isDark} userId={userId}/>
            ) : (
              <SessionsScreen name={name} habits={buildHabits} sessions={sessions} sessionsLoaded={sessionsLoaded} onAddHabit={function() { setAddHabitType("build"); }} onTapHabit={function(h) { setSelectedHabit(h); }} onLogSession={handleLogSession} onLogPast={function(h) { setShowLogPast(h); }}/>
            )}
            {selectedHabit && <EditSheet habit={selectedHabit} onClose={function() { setSelectedHabit(null); }} onUpdate={handleHabitUpdate} onDelete={handleDeleteHabit}/>}
            {addHabitType && <AddHabitSheet onClose={function() { setAddHabitType(null); }} onAdd={handleAddHabit} existingCount={habits.length} defaultType={addHabitType}/>}
            {showAccount && <AccountSheet onClose={function() { setShowAccount(false); }} userId={userId} userEmail={userEmail}/>}
            {showLogPast && <LogPastSheet habit={showLogPast} sessions={sessions} onClose={function() { setShowLogPast(null); }} onLog={handleLogSession} onRemove={handleDeleteSession}/>}
          </div>
          <BottomNav activeTab={activeTab} onSwitch={function(tab) { setActiveTab(tab); }}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("/sw.js").catch(function(err) { console.log("SW error:", err); });
      });
    }
  </script>
</body>
</html>
